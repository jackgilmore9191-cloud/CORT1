* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  font-family: 'PingFang SC', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  color: #fff;
  position: relative;
}

/* 视频背景 */
.video-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -2;
  overflow: hidden;
}
.video-container video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
}

/* 暗角 + 渐变滤镜，让文字更突出 */
.bg-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: 
    radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.7) 100%),
    linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%);
  z-index: -1;
}

/* 动态扫描线（赛博感拉满） */
.scanline {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 4px;
  background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.8), transparent);
  animation: scan 4s linear infinite;
  z-index: 1;
  opacity: 0.6;
}

@keyframes scan {
  0% { transform: translateY(0); }
  100% { transform: translateY(100vh); }
}

/* 粒子光效容器 */
.particles {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
}

.particle {
  position: absolute;
  width: 2px;
  height: 2px;
  background: rgba(255, 100, 0, 0.8);
  border-radius: 50%;
  box-shadow: 0 0 6px rgba(255, 100, 0, 0.6);
  animation: float 8s infinite ease-in-out;
}

@keyframes float {
  0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.8; }
  50% { transform: translate(20px, -40px) scale(1.2); opacity: 0.4; }
}

/* 主内容容器 */
.content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 2;
  width: 90%;
  max-width: 600px;
  max-height: 95vh;
  overflow-y: auto;
  padding-bottom: 20px;
}

/* 霓虹发光标题（CORT工作室） */
h1 {
  font-size: 48px;
  font-weight: 900;
  margin-bottom: 20px;
  background: linear-gradient(90deg, #ff2a6d, #d74177, #feffb7, #05d9e8, #ff2a6d);
  background-size: 200% auto;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 0 20px rgba(255, 42, 109, 0.6), 0 0 40px rgba(5, 217, 232, 0.4);
  animation: textShine 3s linear infinite;
  letter-spacing: 2px;
}

@keyframes textShine {
  to { background-position: 200% center; }
}

/* 副标题 */
.subtitle {

  text-shadow: 0 0 10px rgba(255, 215, 0, 0.6);

/* 超质感安装按钮（火焰渐变） */
